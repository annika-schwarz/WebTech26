<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Übung 4</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container">

    <h1 class="my-5">Jetzt registrieren!</h1>
    <p class="mb-5 fst-italic text-muted">Wir freuen uns, dich bei uns begrüßen zu dürfen. Bitte fülle das folgende Formular aus, um dich zu registrieren.</p>

<div class="row">
    <div class="col-12 col-md-6 col-xl-4">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="firstName" placeholder="Vorname">
            <label for="firstName">Vorname</label>
        </div>
    </div>

    <div class="col-12 col-md-6 col-xl-4">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="lastName" placeholder="Nachname">
            <label for="lastName">Nachname</label>
        </div>
    </div>    
</div>


<div class="row">
    <div class="col-12 col-md-6 col-xl-4">
        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="E-mail">
            <label for="email">E-mail</label>
        </div>
    </div>
    <div class="col-12 col-md-6 col-xl-4">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="ipAddress" placeholder="IP-Adresse">
            <label for="ipAddress">IP-Adresse</label>
        </div>
    </div>    
</div>

<div class="row">
    <div class="d-grid gap-2 col-12 col-md-6 mx-auto">
    <button class="btn btn-success fw-bold" style="background-color:#00868B;" type="button">Registrieren</button>
    <button class="btn btn-secondary fw-light" type="button">Abbrechen</button>
    </div>
</div>


</body>
</html>
