<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Übung 5</title>
    <style>
        img {
            width: 50px;
        }
    </style>
</head>
<body class="container" onload="init()">
    <h1>Städte</h1>
    <div class="row my-4">
        <div class="col-2">
            <label for="filter">Filter:</label>
        </div>
        <div class="col-10">
            <input type="text" class="form-control" id="filter" oninput="createTable()"/>
        </div>     
    </div>
    <table class="table table-striped table-hover align-middle">
        <thead>
            <tr>
                <th scope="col">Nr</th>
                <th scope="col">Jahr</th>
                <th scope="col">Stadt</th>
                <th scope="col">Link</th>
                <th scope="col">Bild</th>
            </tr>
        </thead>
        <tbody id="tbody">
            
        </tbody>
    </table>
    <script>
        let staedtearr = [];

        async function getStaedte() {

            const request = new Request('staedte.json', {
                    method: 'GET',      // GET ist default
                    headers: {
                        'Accept': 'application/json'
                    }
                });

            const response = await fetch(request);
            console.log(response);
            return response.json();
        }

        function createTable()
        {
            let input = document.getElementById('filter').value; 
            console.log('input: ', input);

            if(staedtearr.length > 0)
            {
                let tbody = document.getElementById('tbody');
                tbody.innerHTML = ''; // table leeren, damit sie nicht immer länger wird, sondern immer nur die gefilterten Zeilen anzeigt
                let nr = 1;
                for(let stadtObj of staedtearr) {       //in der For-of-Schleife wird jedes Objekt des Staedte-Arrays nacheinander in der Variable stadtObj gespeichert
                    //console.log('stadt: ', stadtObj.stadt); // Backticks, damit die Variable stadtObj.stadt in den String eingebettet werden kann mit ${}
                    
                    if(stadtObj.stadt.toLowerCase().includes(input.toLowerCase()) ||
                    stadtObj.jahr.toString().includes(input)) //muss in String umgewandelt werden, damit includes() funktioniert, da input ja auch ein String ist; hier wird geprüft, ob die Eingabe entweder im Stadtnamen oder im Gründungsjahr enthalten ist
                    {
                        tbody.innerHTML += `        
                            <tr>
                                <td>${nr}</td>
                                <td>${stadtObj.jahr}</td>
                                <td>${stadtObj.stadt}</td>
                                <td><a href="${stadtObj.link}" class="btn btn-sm btn-success"
                                    target="_blank">Info</a></td>
                                <td><img src="${stadtObj.bild}" alt="Wappen der Stadt ${stadtObj.stadt}"></td>
                            </tr>`;
                    nr++;
                    }
                
                // hier muessen jetzt die einzelnen Zeilen in die Tabelle eingelesen werden
                // das Staedte-Array muss ausgelesen werden (z.B. for(stadt of staedtearr)
                // Tipp: zunaechst einfach alle anzeigen lassen und erst dann das Filtern einbauen
                // Filtern: die Eingabe mit dem jeweiligen Gruendungsjahr bzw. der jeweiligen Stadt
                // vergleichen (siehe z.B. includes() und toLowerCase())
                // wenn match, dann entsprechende Zeile einfuegen; sonst nicht
                }
            }
        }

        async function init() {
                    
            // hier getStaedte() aufrufen und
            // staedtearr befuellen!
            // siehe Promises!

           /* fetch('staedte.json')
                .then(response => {
                    console.log('response', response);
                    return response.json();
                })
                .then(data => {
                    console.log('data: ', data.staedte);
                    staedtearr = data.staedte;
                })
                    */

                let response = await fetch('staedte.json')    //Rückgabetyp: Promise<Response>, deshalb Schlüsselwort await und Funktion als async deklarieren
                console.log('response ', response);            // so geht es ohne then-Verkettung, da wir mit await auf die Rückgabe warten können
                let data = await response.json()               //Rückgabetyp: Promise<any>, deshalb Schlüsselwort await
                console.log('data: ', data.staedte);
                staedtearr = data.staedte;
                createTable();

        }

        
    </script>
</body>
</html>
